name: Android

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # necesario para adjuntar el APK a la Release

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache de Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Dar permiso de ejecucion a gradlew
        run: chmod +x gradlew

      - name: Compilar APK debug
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Preparar firma estable de release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64" || { echo "Falta el secreto ANDROID_KEYSTORE_BASE64"; exit 1; }
          test -n "$ANDROID_KEYSTORE_PASSWORD" || { echo "Falta el secreto ANDROID_KEYSTORE_PASSWORD"; exit 1; }
          test -n "$ANDROID_KEY_ALIAS" || { echo "Falta el secreto ANDROID_KEY_ALIAS"; exit 1; }
          test -n "$ANDROID_KEY_PASSWORD" || { echo "Falta el secreto ANDROID_KEY_PASSWORD"; exit 1; }
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > release.keystore
          echo "ANDROID_KEYSTORE_FILE=$PWD/release.keystore" >> "$GITHUB_ENV"

      - name: Compilar APK release firmado
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION_NAME="${GITHUB_REF_NAME#v}"
          ./gradlew :app:assembleRelease \
            -PversionCode="${GITHUB_RUN_NUMBER}" \
            -PversionName="$VERSION_NAME" \
            --no-daemon --stacktrace

      - name: Verificar firma del APK release
        if: startsWith(github.ref, 'refs/tags/v')
        run: "$ANDROID_HOME/build-tools/35.0.0/apksigner verify --verbose app/build/outputs/apk/release/app-release.apk"

      - name: Renombrar APK con la version
        id: apk
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            SRC=app/build/outputs/apk/release/app-release.apk
          else
            SRC=app/build/outputs/apk/debug/app-debug.apk
          fi
          VER="${GITHUB_REF_NAME//\//-}"
          OUT="SonyLiveMonitor-${VER}.apk"
          cp "$SRC" "$OUT"
          echo "path=android/$OUT" >> "$GITHUB_OUTPUT"
          # Copia del APK de camara con nombre inequivoco (NO instalar en el movil)
          cp "$GITHUB_WORKSPACE/camera-patches/SonyLiveMonitor-a6000-avcontent.apk" \
            "SonyLiveMonitor-a6000-avcontent-ONLY-FOR-CAMERA.apk"
          echo "camera=android/SonyLiveMonitor-a6000-avcontent-ONLY-FOR-CAMERA.apk" >> "$GITHUB_OUTPUT"

      - name: Extraer notas de release del tag
        id: notes
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          # Saca la seccion "## vX.Y" de docs/RELEASE_NOTES.md (hasta el siguiente '## ')
          NOTES_FILE="$GITHUB_WORKSPACE/docs/RELEASE_NOTES.md"
          OUT="$GITHUB_WORKSPACE/release-body.md"
          if awk -v tag="## ${GITHUB_REF_NAME}" '
              $0==tag {found=1; next}
              found && /^## / {exit}
              found {print}
            ' "$NOTES_FILE" > "$OUT" && [ -s "$OUT" ]; then
            echo "path=$OUT" >> "$GITHUB_OUTPUT"
          else
            echo "Sin notas para ${GITHUB_REF_NAME} en RELEASE_NOTES.md; se autogeneraran."
            echo "path=" >> "$GITHUB_OUTPUT"
          fi

      - name: Subir APK como artefacto (siempre)
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      - name: Adjuntar APK a la Release (solo en tags v*)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          # APK del movil (SonyLiveMonitor) + APK de la camara (Smart Remote
          # parcheado con avContent). El de la camara se instala con PMCA-RE.
          files: |
            ${{ steps.apk.outputs.path }}
            ${{ steps.apk.outputs.camera }}
          body_path: ${{ steps.notes.outputs.path }}
          # Si no hay notas propias para el tag, deja que GitHub las autogenere
          generate_release_notes: ${{ steps.notes.outputs.path == '' }}
          fail_on_unmatched_files: true
